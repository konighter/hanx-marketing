<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <!-- Pro Max: 字体预加载（非阻塞） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/config.js"></script>
    <meta
      name="keywords"
      content="翰展管理系统 基于 vue3 + CompositionAPI + typescript + vite3 + element plus 的后台开源免费管理系统！"
    />
    <meta
      name="description"
      content="翰展管理系统 基于 vue3 + CompositionAPI + typescript + vite3 + element plus 的后台开源免费管理系统！"
    />
    <title>%VITE_APP_TITLE%</title>
  </head>
  <body>
    <div id="app">
      <!-- Pro Max: 无 loading 动画，仅用背景色做无缝过渡 -->
      <style>
        #app { width: 100%; height: 100%; background: linear-gradient(160deg, #f3f4f6 0%, #f0f1f3 40%, #edeef0 100%); }
        .dark #app { background: linear-gradient(160deg, #111418 0%, #151a1e 40%, #131618 100%); }
      </style>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
