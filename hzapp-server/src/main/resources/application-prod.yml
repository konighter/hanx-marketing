server:
  port: 48080

--- #################### 数据库相关配置 ####################
spring:
  autoconfigure:
    # noinspection SpringBootApplicationYaml
    exclude:
#      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration # 默认 local 环境，不开启 Quartz 的自动配置
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration # 禁用 AI 模块的 Qdrant，手动创建
      - org.springframework.ai.vectorstore.milvus.autoconfigure.MilvusVectorStoreAutoConfiguration # 禁用 AI 模块的 Milvus，手动创建
      - com.hzltd.framework.operatelog.config.OperateLogAutoConfiguration # 操作日志自动配置
  # 数据源配置项
  datasource:
    dynamic: # 多数据源配置
      hikari: # HikariCP 相关的全局配置
        minimum-idle: 5
        maximum-pool-size: 10
        idle-timeout: 600000
        max-lifetime: 1800000
        connection-timeout: 30000
        connection-test-query: SELECT 1
      primary: master
      datasource:
        master:
          url: jdbc:mysql://${DATABASE_HOST:192.168.1.13}:3307/${DATABASE_NAME:hanx_erplus}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: ${DATABASE_USERNAME:root}
          password: ${DATABASE_PASSWORD:1234}
        slave:
          lazy: true
          url: jdbc:mysql://${SLAVE_DATABASE_HOST:192.168.1.13}:3307/${DATABASE_NAME:hanx_erplus}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&nullCatalogMeansCurrent=true
          username: ${DATABASE_USERNAME:root}
          password: ${DATABASE_PASSWORD:1234}
        doris:
          lazy: true
          url: jdbc:mysql://${DORIS_HOST:192.168.1.13}:9030/${DATABASE_NAME:hanx_erplus}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&nullCatalogMeansCurrent=true
          username: ${DORIS_USERNAME:hanx}
          password: ${DORIS_PASSWORD:123456}

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:192.168.1.13}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
#      password: ${REDIS_PASSWORD:''}

--- #################### 定时任务相关配置 ####################

spring:
  quartz:
    auto-startup: true
    scheduler-name: schedulerName
    job-store-type: jdbc
    wait-for-jobs-to-complete-on-shutdown: true
    properties:
      org:
        quartz:
          scheduler:
            instanceName: schedulerName
            instanceId: AUTO
          jobStore:
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            isClustered: true
            clusterCheckinInterval: 15000
            misfireThreshold: 60000
          threadPool:
            threadCount: 5 # 生产环境线程池调大
            threadPriority: 1
            class: org.quartz.simpl.SimpleThreadPool
    jdbc:
      initialize-schema: NEVER

--- #################### aws 相关配置 ####################
spring:
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY:AKIAZVFYRE4OFJILEDM6}
        secret-key: ${AWS_SECRET_KEY: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}
      region:
        static: ${AWS_REGION:us-east-1}
      sqs:
        enabled: true

--- #################### 服务保障相关配置 ####################

lock4j:
  acquire-timeout: 3000
  expire: 30000

--- #################### 监控相关配置 ####################

logging:
  file:
    name: ${user.home}/logs/${spring.application.name}.log # 生产环境日志路径
  level:
    com.hzltd.module: info
    com.hzltd.framework: info
    com.agentsflex: info
    org.springframework.context.support.PostProcessorRegistrationDelegate: ERROR

debug: false

