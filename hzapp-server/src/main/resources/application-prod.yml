    enable: true # 生产环境开启验证码
  security:
    mock-enable: false # 生产环境禁用 Mock 授权
  pay:
    order-notify-url: ${PAY_ORDER_NOTIFY_URL}
    refund-notify-url: ${PAY_REFUND_NOTIFY_URL}
    transfer-notify-url: ${PAY_TRANSFER_NOTIFY_URL}
  access-log:
    enable: true # 生产环境开启访问日志
  demo: false
  wxa-code:
