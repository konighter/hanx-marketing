  tencent-lbs-key: ${TENCENT_LBS_KEY}

  aws:
    sqs:
      adv-queue: ${AWS_SQS_ADV_QUEUE:arn:aws:sqs:us-east-1:663959447324:HanXErplus-advReportQueue-us-east}
      spapi-queue: ${AWS_SQS_SPAPI_QUEUE:arn:aws:sqs:us-east-1:663959447324:HanXErplus-OrderEventQueue-us-east}
      ads-manager-queue: ${AWS_SQS_ADS_MANAGER_QUEUE:arn:aws:sqs:us-east-1:663959447324:HanXErplus-AdvManger-us-east}
