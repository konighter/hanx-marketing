version: "3"
networks:
  custom_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.80.0/24

services:
  fe:
    image: apache/doris:fe-4.0.1
    hostname: fe
    ports:
      - 8030:8030
      - 9030:9030
      - 9010:9010
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - FE_ID=1
      - FE_JAVA_OPTS=-Xmx2g -Xms2g -XX:+UseG1GC
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      custom_network:
        ipv4_address: 172.20.80.2
    volumes:
      - /Users/work/proj/opt/dockers/doris/fe/meta:/opt/apache-doris/fe/doris-meta  # FE 元数据
      - /Users/work/proj/opt/dockers/doris/fe/log:/opt/apache-doris/fe/log 

  be:
    image: apache/doris:be-4.0.1
    hostname: be
    ports:
      - 8040:8040
      - 9050:9050
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - BE_ADDR=172.20.80.3:9050
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - /Users/work/proj/opt/dockers/doris/be/data:/opt/apache-doris/be/storage  # BE 数据目录
      - /Users/work/proj/opt/dockers/doris/be/log:/opt/apache-doris/be/log
    depends_on:
      - fe
    networks:
      custom_network:
        ipv4_address: 172.20.80.3
