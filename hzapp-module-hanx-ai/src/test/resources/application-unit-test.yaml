spring:
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
          driver-class-name: org.h2.Driver
          username: sa
          password: ""
  sql:
    init:
      mode: always
  main:
    allow-bean-definition-overriding: true

mybatis-plus:
  global-config:
    db-config:
      id-type: auto

hzapp:
  info:
    base-package: com.hzltd
